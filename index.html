<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelist · Strategy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --black:#000000; --soft-black:#1A1A1A; --navy:#0C4160; --slate:#68869A;
  --white:#FFFFFF; --warm-gray:#DAD9D6; --blue-gray:#D7E0EB; --soft-ivory:#F6F1E8;
  --gold:#A68B5B; --plum:#5B4A6A; --terra:#B4654A; --teal:#2E8B7A; --sage:#3D6B5E;
  --sage-mist:#C5CDB9; --soft-clay:#C5A38B; --ink-plum:#3D2E4A; --stone:#A8A09A;
  --border:#E8E6E1; --muted:#7A8A95; --bg:#FFFFFF; --grid:#F0EFEC;
  --shadow-soft:0 1px 3px rgba(26,26,26,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--soft-black);background:var(--bg);
  font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-weight:400;
}
.display{font-family:'Lovelo','Lato',system-ui,sans-serif;font-weight:900;letter-spacing:-0.01em;text-transform:uppercase}
.label{font-size:8px;font-weight:700;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase}
a{color:inherit}

/* ============= LAYOUT ============= */
.app{display:block;min-height:100vh}
.sidebar{background:var(--soft-black);color:var(--white);padding:24px 20px;display:flex;flex-direction:column;gap:16px;position:sticky;top:0;height:100vh;overflow:hidden}
.main{padding:40px 56px 80px;max-width:1400px;overflow-x:hidden}
/* ============= MASTHEAD ============= */
.masthead{background:var(--soft-black);width:100%}
.masthead-inner{max-width:1400px;padding:18px 56px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.masthead .brand-logo{width:auto;max-width:200px;height:34px;display:block}
.masthead-meta{display:flex;flex-direction:column;gap:5px;align-items:flex-end;text-align:right} .masthead-confid{font-size:9px;color:var(--slate);letter-spacing:0.22em;text-transform:uppercase;font-weight:700} .masthead-confid span{color:var(--gold);margin:0 7px;font-weight:900}
.masthead-sub{font-size:9px;color:var(--slate);letter-spacing:0.2em;text-transform:uppercase}
.masthead-asof{font-size:15px;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;font-weight:800}

/* ============= SIDEBAR ============= */
.brand{padding:4px 4px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.brand-logo{width:100%;max-width:240px;height:auto;display:block}
.brand-sub{font-size:9px;color:var(--slate);letter-spacing:0.2em;text-transform:uppercase;margin-top:6px;padding-left:2px}

/* Top confidential banner */
.confid-banner{background:var(--warm-gray);color:var(--soft-black);padding:8px 14px;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;font-weight:700;text-align:center;margin:-40px -56px 28px;font-family:'Lato',sans-serif}
.confid-banner span{color:var(--gold);margin:0 10px;font-weight:900}

/* Expandable disclosure section */
.disclosure-full{margin-top:20px;background:#fff;border:1px solid var(--border)}
.disclosure-full summary{padding:14px 20px;cursor:pointer;font-family:'Lovelo','Lato',sans-serif;font-weight:900;font-size:13px;letter-spacing:-0.005em;text-transform:uppercase;color:var(--soft-black);background:var(--white);list-style:none;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid transparent}
.disclosure-full summary::-webkit-details-marker{display:none}
.disclosure-full summary::after{content:'+';font-size:18px;color:var(--gold);font-weight:400}
.disclosure-full[open] summary{border-bottom-color:var(--border)}
.disclosure-full[open] summary::after{content:'－'}
.disclosure-full .body{padding:22px 24px 28px;font-size:11.5px;line-height:1.6;color:#333}
.disclosure-full .body h4{font-family:'Lato',sans-serif;font-weight:900;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--navy);margin-top:18px;margin-bottom:6px}
.disclosure-full .body h4:first-child{margin-top:0}
.disclosure-full .body p{margin-bottom:8px}
.disclosure-full .body .caps{text-transform:uppercase;font-weight:700;font-size:10.5px;letter-spacing:0.04em}
.ac-map-table{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:8px}
.ac-map-table th,.ac-map-table td{padding:4px 8px;text-align:left;border-bottom:1px solid var(--grid)}
.ac-map-table th{color:var(--slate);font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;border-bottom:1px solid var(--navy);background:var(--soft-ivory);position:sticky;top:0}
.ac-map-table tr.cat-equity td:first-child{color:var(--navy);font-weight:700}
.ac-map-table tr.cat-fi td:first-child{color:var(--sage);font-weight:700}
.ac-map-table tr.cat-alt td:first-child{color:var(--terra);font-weight:700}
.ac-map-table tr.cat-cash td:first-child{color:var(--gold);font-weight:700}
.ac-map-wrap{max-height:420px;overflow-y:auto;border:1px solid #F0F0EE;margin-top:6px}

.search-box{position:relative}
.search-box input{
  width:100%;background:#000;border:1px solid #333;color:#fff;
  padding:10px 12px 10px 34px;font-family:inherit;font-size:13px;outline:none;
}
.search-box input:focus{border-color:var(--slate)}
.search-box::before{content:'';position:absolute;left:12px;top:50%;width:13px;height:13px;transform:translateY(-50%);
  background:no-repeat center/contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2368869A' stroke-width='2'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.5' y2='16.5'/></svg>")}

.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;padding:4px 10px;background:transparent;border:1px solid #333;color:#b4b4b4;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;font-family:inherit;transition:all 0.15s}
.chip:hover{border-color:var(--slate);color:#fff}
.chip.active{background:var(--slate);border-color:var(--slate);color:#fff}

.series-list{flex:1;overflow-y:auto;margin:0 -20px;padding:0 20px}
.series-list::-webkit-scrollbar{width:6px}
.series-list::-webkit-scrollbar-track{background:transparent}
.series-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.series-group{margin-bottom:10px}
.series-header{font-size:9px;color:var(--slate);letter-spacing:0.2em;text-transform:uppercase;padding:6px 0 4px;border-bottom:1px solid #333;margin-bottom:4px;display:flex;justify-content:space-between}
.series-header .count{color:#666}
.strat-item{padding:7px 8px;cursor:pointer;font-size:12px;border-left:2px solid transparent;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:background 0.12s}
.strat-item:hover{background:rgba(255,255,255,0.04)}
.strat-item.active{background:rgba(166,139,91,0.20);border-left-color:var(--gold)}
.strat-item .sid{color:var(--slate);font-size:9px;letter-spacing:0.1em;font-weight:700}
.strat-item .sname{flex:1;color:#e4e4e4}
.strat-item.active .sname{color:#fff}
.summary-nav{margin-bottom:12px;padding:10px 10px;background:rgba(255,255,255,0.04);border:1px solid #333;border-left:2px solid transparent;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:all 0.15s}
.summary-nav:hover{background:rgba(255,255,255,0.07);border-color:var(--slate)}
.summary-nav.active{background:rgba(166,139,91,0.20);border-left-color:var(--gold);border-color:rgba(166,139,91,0.45)}
.summary-nav .sid{color:var(--gold);font-size:9px;letter-spacing:0.14em;font-weight:900;text-transform:uppercase}
.summary-nav .sname{flex:1;color:#fff;font-size:12px;font-weight:700}

.sidebar-footer{padding-top:12px;border-top:1px solid #222;font-size:10px;color:#555;letter-spacing:0.08em}

/* ============= MAIN HEADER ============= */
.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;padding-bottom:24px;border-bottom:1px solid var(--border);margin-bottom:28px}
.hero-left{flex:1;min-width:0}
.hero-badges{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.badge{font-size:9px;padding:4px 10px;background:var(--blue-gray);color:var(--navy);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;border-radius:3px}
.badge.terra{background:var(--gold);color:#fff}
.badge.sage{background:var(--sage);color:#fff}
.badge.outline{background:transparent;border:1px solid var(--soft-black);color:var(--soft-black)}
.hero-title{font-family:'Lovelo','Lato',sans-serif;font-weight:900;font-size:42px;line-height:1.0;letter-spacing:-0.005em;color:var(--soft-black);margin-bottom:8px;text-transform:uppercase}
.hero-id{color:var(--slate);font-size:11px;letter-spacing:0.18em;margin-bottom:12px}
.hero-overview{font-size:15px;color:#333;max-width:780px;line-height:1.55}

.hero-right{text-align:right;font-size:11px;color:var(--muted);letter-spacing:0.04em;flex-shrink:0;min-width:220px}
.hero-right .k{color:var(--slate);text-transform:uppercase;letter-spacing:0.18em;font-size:9px;margin-bottom:1px;margin-top:10px}
.hero-right .k:first-child{margin-top:0}
.hero-right .v{color:var(--soft-black);font-size:13px;font-weight:700;line-height:1.35}
.hero-right .holdings-call{display:flex;gap:14px;justify-content:flex-end;align-items:baseline;margin-top:2px}
.hero-right .holdings-call .big{font-family:'Lovelo','Lato',sans-serif;font-weight:900;font-size:28px;color:var(--navy);letter-spacing:-0.01em;line-height:1}
.hero-right .holdings-call .lbl{font-size:8px;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;margin-top:4px}
.hero-right .holdings-call .divider{color:var(--warm-gray);font-size:22px;line-height:1}

.strategy-hero{display:grid;grid-template-columns:minmax(500px,1.35fr) minmax(320px,0.75fr);gap:24px;align-items:start;padding-bottom:18px;margin-bottom:18px}
.strategy-hero .hero-left{min-width:0}
.strategy-hero .hero-title{font-size:42px;line-height:0.98;margin-bottom:12px;max-width:720px}
.hero-info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;max-width:690px}
.hero-info-grid .hero-fact.wide{grid-column:span 2}
.hero-fact{background:#fff;border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:5px;padding:9px 12px;min-height:48px;display:flex;flex-direction:column;justify-content:center}
.hero-fact .hf-label{font-size:8.5px;color:var(--slate);letter-spacing:0.13em;text-transform:uppercase;font-weight:900;line-height:1.2}
.hero-fact .hf-value{font-family:'Lato',sans-serif;font-size:13px;line-height:1.2;color:var(--soft-black);font-weight:900;margin-top:4px}
.hero-overview-panel{border-left:1px solid var(--border);padding-left:22px;min-height:104px;display:flex;align-items:flex-start}
.strategy-hero .hero-overview{font-size:12px;line-height:1.55;color:var(--soft-black);max-width:none;margin:0}

/* ============= KPI ROW ============= */
.kpi-row{display:grid;grid-template-columns:repeat(6, 1fr);gap:0;margin-bottom:22px;border:1px solid var(--border);background:#fff;border-radius:8px;overflow:hidden}
.kpi{padding:14px 16px;border-right:1px solid var(--border);position:relative;display:flex;flex-direction:column;gap:4px}
.kpi:last-child{border-right:none}
.kpi .label{margin-bottom:4px}
.kpi .val{font-size:24px;font-weight:900;color:var(--navy);letter-spacing:-0.01em;font-family:'Lovelo','Lato',sans-serif;line-height:1.1}
.kpi .val.pos{color:var(--teal)}
.kpi .val.neg{color:var(--terra)}
.kpi .sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.35}
.kpi .bmk-row{display:flex;justify-content:space-between;gap:6px;font-size:10px;margin-top:2px;align-items:baseline}
.kpi .bmk-lbl{letter-spacing:0.1em;text-transform:uppercase;font-size:8.5px;color:var(--slate);font-weight:700}
.kpi .bmk-val{color:#333;font-weight:700;font-size:11px}
.kpi .delta{display:inline-block;font-size:10px;font-weight:700;margin-top:2px;padding:1.5px 6px;letter-spacing:0.04em;align-self:flex-start}
.kpi .delta.pos{background:rgba(46,139,122,0.12);color:var(--teal)}
.kpi .delta.neg{background:rgba(180,101,74,0.12);color:var(--terra)}
.kpi .delta.flat{background:var(--warm-gray);color:var(--muted)}
.kpi.single .bmk-row{visibility:hidden}
.kpi.single .delta{visibility:hidden}

/* ============= TABS ============= */
.tabs{display:flex;gap:2px;margin-bottom:28px;background:#fff;border:1px solid var(--border);padding:4px;width:fit-content;border-radius:8px}
.tab{padding:9px 22px;font-family:'Lovelo','Lato',sans-serif;font-weight:900;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:none;color:var(--slate);cursor:pointer;transition:all 0.15s;border-bottom:2px solid transparent;border-radius:4px 4px 0 0}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--soft-black);background:var(--soft-ivory);border-bottom-color:var(--gold)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.tabbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px} .tabbar .tabs{margin-bottom:0} .pdf-btn{font-family:'Lato',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#fff;background:var(--soft-black);border:1px solid var(--soft-black);padding:9px 16px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s,border-color .15s} .pdf-btn:hover{background:var(--gold);border-color:var(--gold)} .pdf-btn svg{width:14px;height:14px} .print-overlay{display:none} body.printing .print-overlay{display:flex;position:fixed;inset:0;background:rgba(26,26,26,0.92);color:#fff;align-items:center;justify-content:center;z-index:9999;font-family:'Lato',sans-serif;letter-spacing:0.12em;text-transform:uppercase;font-size:14px} @media print{@page{margin:12mm}*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}body{background:#fff !important}.tabbar{display:none !important}.print-overlay{display:none !important}.tab-panel{display:block !important}.tab-panel + .tab-panel{page-break-before:always}.card{break-inside:avoid;page-break-inside:avoid}.masthead{background:var(--soft-black) !important}.masthead-inner{padding:14px 0 !important}.main{padding:16px 0 60px !important}.chart-wrap{height:auto !important}.chart-wrap canvas{width:100% !important;height:auto !important}details.disclosure-full{display:block !important}details.disclosure-full > .body{display:block !important}}

/* ============= SECTION ============= */
.section{margin-bottom:32px}
.section-label{font-size:9px;color:var(--gold);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.section-rule{height:1px;background:var(--warm-gray);margin-bottom:16px}
.section-title{font-family:'Lato';font-weight:900;font-size:18px;color:var(--soft-black);margin-bottom:14px;letter-spacing:-0.01em}

.card{background:#fff;border:1px solid var(--border);padding:22px;border-radius:8px;box-shadow:var(--shadow-soft)}
.card h3{font-size:13px;font-weight:700;color:var(--soft-black);margin-bottom:14px;letter-spacing:0.01em}
.card h3 .subtitle{font-weight:400;color:var(--muted);font-size:11px;margin-left:8px;letter-spacing:0.04em}
.card h3 .tag{font-size:9px;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;float:right;background:var(--warm-gray);padding:3px 9px;border-radius:3px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:18px;align-items:stretch}
.stack{display:flex;flex-direction:column;gap:18px}

.chart-wrap{position:relative;width:100%}
.chart-wrap.h180{height:180px}
.chart-wrap.h220{height:220px}
.chart-wrap.h260{height:260px}
.chart-wrap.h300{height:300px}
.chart-wrap.h340{height:340px}
.chart-wrap.h400{height:400px}

/* ============= TABLES ============= */
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data th,table.data td{padding:6px 9px;text-align:right;border-bottom:1px solid var(--grid)}
table.data th{color:var(--slate);font-weight:700;text-align:right;font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;border-bottom:1px solid var(--soft-black)}
table.data th:first-child,table.data td:first-child{text-align:left}
table.data tr:last-child td{border-bottom:none}
table.data td.pos{color:var(--teal)}
table.data td.neg{color:var(--terra)}
table.data td.hl{font-weight:700;background:var(--soft-ivory);color:var(--soft-black)}
table.data tbody tr:hover td{background:var(--soft-ivory)}

.annual-table{max-height:480px;overflow-y:auto}
.annual-table::-webkit-scrollbar{width:6px}
.annual-table::-webkit-scrollbar-thumb{background:var(--warm-gray)}

.summary-table-wrap{max-height:640px;overflow:auto;border:1px solid var(--border);border-radius:6px;background:#fff}
.summary-table-wrap table.data{min-width:1180px;font-size:11px}
.summary-table-wrap th{position:sticky;top:0;background:#fff;z-index:2}
.summary-table-wrap th:first-child,.summary-table-wrap td:first-child{position:sticky;left:0;background:#fff;z-index:3}
.summary-table-wrap th:nth-child(2),.summary-table-wrap td:nth-child(2){position:sticky;left:78px;background:#fff;z-index:3}
.summary-table-wrap tbody tr:hover td:first-child,.summary-table-wrap tbody tr:hover td:nth-child(2){background:var(--soft-ivory)}
.summary-table-wrap td:first-child{font-weight:900;color:var(--navy);letter-spacing:0.08em}
.summary-table-wrap td:nth-child(2){min-width:260px;font-weight:700}
.summary-note{font-size:10px;color:var(--muted);margin-top:10px;line-height:1.55}

/* ============= RISK GAUGE ============= */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:8px}
.gauge-val{font-size:36px;font-weight:900;color:var(--navy);font-family:'Lovelo','Lato',sans-serif;letter-spacing:-0.01em;margin-top:-48px}
.gauge-label{font-size:10px;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;margin-top:8px}
.gauge-scale{display:flex;justify-content:space-between;width:180px;font-size:9px;color:var(--muted);margin-top:4px}

/* ============= TRADABILITY ============= */
.trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
.trade-cell{padding:12px 14px;background:#fff;border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px}
.trade-cell .tc-label{font-size:8.5px;color:var(--slate);letter-spacing:0.16em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.trade-cell .tc-stats{display:flex;justify-content:space-between;gap:6px;font-size:11px;color:#333}
.trade-cell .tc-stats .tc-stat{flex:1;text-align:center}
.trade-cell .tc-stats .tc-stat .n{font-family:'Lovelo','Lato',sans-serif;font-weight:900;font-size:20px;color:var(--navy);display:block;line-height:1;letter-spacing:-0.01em}
.trade-cell .tc-stats .tc-stat .k{font-size:7.5px;color:var(--slate);letter-spacing:0.14em;text-transform:uppercase;margin-top:3px;display:block}

/* ============= SCATTER QUADRANTS ============= */
.scatter-container{position:relative}
.scatter-quads{position:absolute;inset:14px 14px 76px 58px;pointer-events:none;font-size:10px;color:var(--slate);letter-spacing:0.1em;text-transform:uppercase;font-weight:700}
.scatter-quads .q{position:absolute;background:rgba(255,255,255,0.85);padding:1px 4px}
.scatter-quads .q-tl{top:2px;left:2px}
.scatter-quads .q-tr{top:2px;right:2px}
.scatter-quads .q-bl{bottom:2px;left:2px;color:var(--terra)}
.scatter-quads .q-br{bottom:2px;right:2px;color:var(--terra)}
.scatter-quads .q-tl{color:var(--teal)}
.scatter-quads .q-tr{color:var(--teal)} .scatter-quads .q-pct{display:block;font-size:12px;font-weight:800;letter-spacing:0.02em;margin-top:1px;color:inherit}

/* ============= REGIME TABLE ============= */
.regime-table .r-bull{background:#E8F0E8;color:#3D6B5E;font-weight:700;padding:2px 9px;font-size:9px;letter-spacing:0.1em;display:inline-block;min-width:52px;text-align:center;border-radius:3px}
.regime-table .r-bear{background:#F4E2DD;color:#B4654A;font-weight:700;padding:2px 9px;font-size:9px;letter-spacing:0.1em;display:inline-block;min-width:52px;text-align:center;border-radius:3px}
.regime-legend{display:flex;gap:14px;font-size:10px;color:var(--muted);margin-top:8px}
.regime-legend .lg{display:flex;align-items:center;gap:5px}
.regime-legend .lg .sw{width:14px;height:10px;display:inline-block}

/* ============= ALLOCATION RANGE BARS ============= */
.range-row{display:grid;grid-template-columns:170px 1fr;gap:14px;padding:8px 0 13px;align-items:center;border-bottom:1px solid var(--grid)}
.range-row:last-child{border-bottom:none}
.range-row .rr-name{font-size:11.5px;color:#333;font-weight:700;text-align:right;line-height:1.25}
.range-row.eq .rr-name{color:var(--navy)}
.range-row.fi .rr-name{color:var(--sage)}
.range-row.alt .rr-name{color:var(--terra)}
.range-row.cash .rr-name{color:var(--gold)}
.range-row .rr-bar{position:relative;height:44px}
.range-row .rr-track{position:absolute;top:20px;left:0;right:0;height:4px;background:var(--grid);border-radius:2px}
.range-row .rr-range{position:absolute;top:18px;height:8px;background:#D7E0EB;border-radius:4px}
.range-row .rr-range.fi{background:#C9DCD4}
.range-row .rr-range.alt{background:#EDD5CC}
.range-row .rr-range.cash{background:#E8DCC0}
.range-row .rr-dot{position:absolute;top:6px;width:28px;height:28px;border-radius:50%;background:var(--navy);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--navy);z-index:4;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:900;line-height:1;letter-spacing:-0.02em}
.range-row .rr-dot.fi{background:var(--sage);box-shadow:0 0 0 1.5px var(--sage)}
.range-row .rr-dot.alt{background:var(--terra);box-shadow:0 0 0 1.5px var(--terra)}
.range-row .rr-dot.cash{background:var(--gold);box-shadow:0 0 0 1.5px var(--gold)}
.range-row .rr-min,.range-row .rr-max{position:absolute;top:38px;font-size:10px;color:var(--slate);white-space:nowrap;font-weight:700;letter-spacing:0.02em}
.range-row .rr-min{transform:translateX(-50%)}
.range-row .rr-max{transform:translateX(-50%)}
.range-row .rr-cur{display:none}
.range-row.eq .rr-cur{color:var(--navy)}
.range-row.fi .rr-cur{color:var(--sage)}
.range-row.alt .rr-cur{color:var(--terra)}
.range-row.cash .rr-cur{color:var(--gold)}
.range-axis{display:grid;grid-template-columns:170px 1fr;gap:14px;padding:4px 0 10px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.range-axis .a-lbl{font-size:8.5px;color:var(--slate);letter-spacing:0.18em;text-transform:uppercase;font-weight:700;text-align:right}
.range-axis .a-scale{display:flex;justify-content:space-between;font-size:9px;color:var(--slate);letter-spacing:0.08em}

/* ============= HOLDINGS LIST ============= */
.holdings-list{display:flex;flex-direction:column;gap:4px;max-height:420px;overflow-y:auto}
.holdings-list::-webkit-scrollbar{width:6px}
.holdings-list::-webkit-scrollbar-thumb{background:var(--warm-gray)}
.holding-row{display:grid;grid-template-columns:1fr 100px 70px;gap:10px;padding:7px 10px;border-bottom:1px solid var(--grid);align-items:center;font-size:11.5px}
.holding-row .hrn{color:#333;font-weight:700}
.holding-row .hrc{font-size:9.5px;color:var(--slate);letter-spacing:0.08em;text-transform:uppercase;text-align:right}
.holding-row .hrw{text-align:right;font-weight:700;color:var(--navy)}
.holding-cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

/* ============= BACKGROUND TEXT ============= */
.prose{font-size:13.5px;line-height:1.65;color:#333}
.prose p{margin-bottom:10px}

/* ============= DISCLOSURE ============= */
.disclosure{font-size:10px;color:var(--muted);line-height:1.5;padding:20px;background:var(--warm-gray);border-top:3px solid var(--gold);margin-top:32px}
.disclosure strong{color:var(--soft-black)}

/* ============= NAV BUTTONS ============= */
.nav-btns{display:flex;gap:8px;margin-top:32px;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 18px;background:#fff;border:1px solid var(--navy);color:var(--navy);font-family:inherit;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.15s}
.nav-btn:hover{background:var(--navy);color:#fff}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.nav-btn.primary{background:var(--gold);border-color:var(--gold);color:#fff}
.nav-btn.primary:hover{background:#8F7447}
.nav-counter{font-size:11px;color:var(--slate);letter-spacing:0.12em}

/* ============= RESPONSIVE ============= */
@media (max-width: 1200px){
  .app{grid-template-columns:280px 1fr}
  .main{padding:32px 32px 60px}
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .kpi:nth-child(3){border-right:none}
  .kpi:nth-child(n+4){border-top:1px solid var(--border)}
}
@media (max-width: 900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:40vh}
  .hero{flex-direction:column}
  .hero-right{text-align:left}
  .strategy-hero{grid-template-columns:1fr;gap:16px}
  .hero-info-grid{grid-template-columns:repeat(2,minmax(0,1fr));max-width:none}
  .hero-info-grid .hero-fact.wide{grid-column:span 1}
  .hero-overview-panel{border-left:0;border-top:1px solid var(--border);padding-left:0;padding-top:14px;min-height:0}
  .grid-2,.grid-3,.grid-23{grid-template-columns:1fr}
  .hero-title{font-size:32px}
  .main{padding:24px 20px 60px}
}
</style>
</head>

// Build a per-strategy color map: asset_class -> hex color
function buildACColorMap(strat){
  const map = {};
  const h = strat.holdingsHistory;
  if(!h || !h.classes) return map;
  // Compute max historical weight per class, then group by category and sort within group
  const perClass = h.classes.map((c, j) => {
    let mx = 0;
    for(let i=0;i<h.weights.length;i++){ if(h.weights[i][j] > mx) mx = h.weights[i][j]; }
    return {ac: c, max: mx, cat: classCategory(c, strat)};
  });
  const byCat = {};
  perClass.forEach(x => { (byCat[x.cat] ||= []).push(x); });
  for(const cat in byCat){
    byCat[cat].sort((a,b) => b.max - a.max); // largest max gets darkest shade
    const palette = CATEGORY_SHADES[cat] || CATEGORY_SHADES['Alternative'];
    byCat[cat].forEach((x, i) => { map[x.ac] = palette[i % palette.length]; });
  }
  return map;
}

function buildLevels(dates, lvls){ return dates.map((d,i)=>[d, lvls[i]]); }

function computeAnalytics(strat){
  const dates = strat.dates;
  const s = strat.sLvl; const b = strat.bLvl;
  const n = dates.length;
  if(n < 2) return null;

  function annRet(levels, months){
    if(levels.length-1 < months) return null;
    const end = levels[levels.length-1]; const start = levels[levels.length-1-months];
    return Math.pow(end/start, 12/months) - 1;
  }
  function itdRet(levels){
    const years = (new Date(dates[n-1]) - new Date(dates[0]))/(365.25*24*3600*1000);
    if(years<=0) return null;
    return Math.pow(levels[n-1]/levels[0], 1/years) - 1;
  }
  function ytdRet(levels){
    const endDate = new Date(dates[n-1]);
    const y = endDate.getFullYear();
    let idx = -1;
    for(let i=0;i<n;i++){
      const d = new Date(dates[i]);
      if(d.getFullYear()===y-1 && d.getMonth()===11) idx = i;
    }
    if(idx<0) return null;
    return levels[n-1]/levels[idx] - 1;
  }
  function annualCal(levels){
    const out = {};
    // map year => idx of dec
    const decIdx = {};
    for(let i=0;i<n;i++){
      const d = new Date(dates[i]);
      if(d.getMonth()===11) decIdx[d.getFullYear()] = i;
    }
    const years = Object.keys(decIdx).map(Number).sort();
    for(const y of years){
      if(decIdx[y-1] != null) out[y] = levels[decIdx[y]]/levels[decIdx[y-1]] - 1;
    }
    // YTD
    const endDate = new Date(dates[n-1]);
    const cy = endDate.getFullYear();
    if(endDate.getMonth() !== 11 && decIdx[cy-1] != null){
      out[cy + '_YTD'] = levels[n-1]/levels[decIdx[cy-1]] - 1;
    }
    return out;
  }
  function ddSeries(levels){
    const out=[]; let peak = levels[0];
    for(let i=0;i<n;i++){ peak = Math.max(peak, levels[i]); out.push({date: dates[i], dd: levels[i]/peak - 1}); }
    return out;
  }
  function rolling12(levels){
    const out = [];
    for(let i=12;i<n;i++) out.push({date: dates[i], r: levels[i]/levels[i-12] - 1});
    return out;
  }
  function rollingVol(levels){
    const rets = [];
    for(let i=1;i<n;i++) rets.push(levels[i]/levels[i-1] - 1);
    const out = [];
    for(let i=11;i<rets.length;i++){
      const win = rets.slice(i-11, i+1);
      const mean = win.reduce((a,b)=>a+b,0)/win.length;
      const v = win.reduce((a,b)=>a+(b-mean)**2,0)/(win.length-1);
      out.push({date: dates[i+1], vol: Math.sqrt(v*12)});
    }
    return out;
  }

  // Total return growth rebased to 0
  const growthS = s.map((v,i)=>({date:dates[i], v: v/s[0] - 1}));
  const growthB = b.map((v,i)=>({date:dates[i], v: v/b[0] - 1}));

  return {
    annRet: {
      strat: {
        YTD: ytdRet(s), '1Y': annRet(s,12), '3Y': annRet(s,36), '5Y': annRet(s,60),
        '10Y': annRet(s,120), '20Y': annRet(s,240), ITD: itdRet(s),
      },
      bench: {
        YTD: ytdRet(b), '1Y': annRet(b,12), '3Y': annRet(b,36), '5Y': annRet(b,60),
        '10Y': annRet(b,120), '20Y': annRet(b,240), ITD: itdRet(b),
      },
    },
    annualCal: { strat: annualCal(s), bench: annualCal(b) },
    ddS: ddSeries(s), ddB: ddSeries(b),
    roll12S: rolling12(s), roll12B: rolling12(b),
    volS: rollingVol(s), volB: rollingVol(b),
    growthS, growthB,
  };
}


function latestStrategyYear(){
  const last = STRATS.reduce((max, s) => {
    const d = new Date(s.asOf || (s.dates && s.dates[s.dates.length-1]) || 0);
    return Math.max(max, d.getFullYear());
  }, 0);
  return last || new Date().getFullYear();
}

function summaryYears(){
  const ytdYear = latestStrategyYear();
  const years = [];
  for(let y=ytdYear-10; y<=ytdYear-1; y++) years.push(y);
  return {years, ytdYear};
}

function calendarReturnForYear(strat, levels, year){
  const decIdx = {};
  for(let i=0;i<strat.dates.length;i++){
    const d = new Date(strat.dates[i]);
    if(d.getMonth() === 11) decIdx[d.getFullYear()] = i;
  }
  if(decIdx[year] == null || decIdx[year-1] == null) return null;
  return levels[decIdx[year]] / levels[decIdx[year-1]] - 1;
}

function ytdReturnForYear(strat, levels, year){
  const decPrev = strat.dates.findIndex(d => {
    const dt = new Date(d);
    return dt.getFullYear() === year-1 && dt.getMonth() === 11;
  });
  let lastIdx = -1;
  for(let i=0;i<strat.dates.length;i++){
    const dt = new Date(strat.dates[i]);
    if(dt.getFullYear() === year) lastIdx = i;
  }
  if(decPrev < 0 || lastIdx < 0) return null;
  return levels[lastIdx] / levels[decPrev] - 1;
}

function relativeCalendarPerf(strat, year){
  const sRet = calendarReturnForYear(strat, strat.sLvl, year);
  const bRet = calendarReturnForYear(strat, strat.bLvl, year);
  return sRet == null || bRet == null ? null : sRet - bRet;
}

function relativeYtdPerf(strat, year){
  const sRet = ytdReturnForYear(strat, strat.sLvl, year);
  const bRet = ytdReturnForYear(strat, strat.bLvl, year);
  return sRet == null || bRet == null ? null : sRet - bRet;
}

// Scatter data: trailing 12m (strat_ret - bench_ret) vs (strat_12m_vol - bench_12m_vol)
function scatterData(strat){
  const n = strat.dates.length;
  const s = strat.sLvl; const b = strat.bLvl;
  if(n < 13) return [];
  // 12m returns ending at i (requires levels[i-12])
  const pts = [];
  // compute rolling 12m vol for each endpoint as well
  const sRet = []; const bRet = [];
  for(let i=1;i<n;i++){ sRet.push(s[i]/s[i-1]-1); bRet.push(b[i]/b[i-1]-1); }
  for(let i=12;i<n;i++){
    const r_s = s[i]/s[i-12] - 1;
    const r_b = b[i]/b[i-12] - 1;
    // 12 monthly returns ending at position i-1 in rets array
    const wS = sRet.slice(i-12, i);
    const wB = bRet.slice(i-12, i);
    const ms = wS.reduce((a,b)=>a+b,0)/wS.length;
    const mb = wB.reduce((a,b)=>a+b,0)/wB.length;
    const vs = Math.sqrt(wS.reduce((a,x)=>a+(x-ms)**2,0)/(wS.length-1) * 12);
    const vb = Math.sqrt(wB.reduce((a,x)=>a+(x-mb)**2,0)/(wB.length-1) * 12);
    pts.push({
      date: strat.dates[i],
      excessR: r_s - r_b,
      excessV: vs - vb,
    });
  }
  return pts;
}

// Regime analysis based on benchmark 10%+ drawdown.
// Convention: Bull = trough-to-peak, Bear = peak-to-trough.
function regimeAnalysis(strat, ddThresh = -0.10){
  const dates = strat.dates; const s = strat.sLvl; const b = strat.bLvl;
  const n = dates.length;
  const regimes = [];
  // State machine
  // 'bull': currently rising; track running peak. If drawdown >= 10%, flip to bear.
  // 'bear': entered after peak. Track trough. When benchmark exceeds prior peak, close bear at trough and start new bull at trough.
  let state = 'bull';
  let bullStart = 0;              // index where current bull began (trough or start)
  let peakLevel = b[0], peakIdx = 0;
  let troughLevel = null, troughIdx = null;
  let recoveryTarget = null;

  for(let i=1;i<n;i++){
    const v = b[i];
    if(state === 'bull'){
      if(v >= peakLevel){ peakLevel = v; peakIdx = i; }
      else if(v/peakLevel - 1 <= ddThresh){
        // Enter bear: close bull at peak
        if(peakIdx > bullStart) regimes.push({type:'Bull', start: bullStart, end: peakIdx});
        state = 'bear';
        troughLevel = v; troughIdx = i;
        recoveryTarget = peakLevel;
      }
    } else { // bear
      if(v < troughLevel){ troughLevel = v; troughIdx = i; }
      if(v >= recoveryTarget){
        // Close bear at trough, start new bull from trough
        regimes.push({type:'Bear', start: peakIdx, end: troughIdx});
        state = 'bull';
        bullStart = troughIdx;
        peakLevel = v; peakIdx = i;
      }
    }
  }

  // Close whatever is open at the end
  if(state === 'bull'){
    if(n-1 > bullStart) regimes.push({type:'Bull', start: bullStart, end: n-1, isCurrent: true});
  } else {
    // Still in bear: close bear at current trough
    regimes.push({type:'Bear', start: peakIdx, end: troughIdx, isCurrent: (troughIdx === n-1)});
    // If current > trough (partial recovery), add a small "Bull (Current)" from trough to now
    if(n-1 > troughIdx) regimes.push({type:'Bull', start: troughIdx, end: n-1, isCurrent: true});
  }

  return regimes.filter(r => r.end > r.start).map((r) => {
    const sRet = s[r.end]/s[r.start] - 1;
    const bRet = b[r.end]/b[r.start] - 1;
    const delta = sRet - bRet;
    // Capture ratio: only meaningful if |bench_ret| is nontrivial
    let cap = null;
    if(Math.abs(bRet) >= 0.005) cap = sRet / bRet * 100;
    const d1 = new Date(dates[r.start]); const d2 = new Date(dates[r.end]);
    const months = (d2.getFullYear() - d1.getFullYear())*12 + (d2.getMonth() - d1.getMonth());
    return {
      type: r.type, isCurrent: !!r.isCurrent, start: dates[r.start], end: dates[r.end],
      sIdx: r.start, eIdx: r.end,
      period: fmtDateShort(dates[r.start]) + ' – ' + fmtDateShort(dates[r.end]),
      months, sRet, bRet, delta, capture: cap,
    };
  });
}

// Asset class allocation min/max/current
function allocationRange(strat){
  const h = strat.holdingsHistory;
  if(!h || !h.classes || !h.classes.length) return [];
  const out = [];
  const lastIdx = h.weights.length - 1;
  for(let j=0;j<h.classes.length;j++){
    let min = Infinity, max = -Infinity;
    for(let i=0;i<h.weights.length;i++){
      const w = h.weights[i][j];
      if(w > max) max = w;
      if(w < min) min = w;
    }
    const cur = h.weights[lastIdx][j];
    if(max <= 0.0001) continue; // never used
    out.push({ac: h.classes[j], min, max, current: cur});
  }
  // sort by current desc, then max desc
  out.sort((a,b) => b.current - a.current || b.max - a.max);
  return out;
}

// Map class name -> category (for coloring)
function classCategory(ac, strat){
  if(ASSET_CLASS_CATEGORY[ac]) return ASSET_CLASS_CATEGORY[ac];
  if(strat.currentHoldings){
    for(const h of strat.currentHoldings){
      if(h.asset_class === ac && h.category) return h.category;
    }
  }
  const a = (ac||'').toLowerCase();
  if(a.includes('bond') || a.includes('treasury') || a.includes('government') || a.includes('convertibles') || a.includes('preferred') || a.includes('muni') || a.includes('tips') || a.includes('bank loan')) return 'Fixed Income';
  if(a.includes('commodit') || a.includes('gold') || a.includes('crypto') || a.includes('bitcoin') || a.includes('ether') || a.includes('liquid alt') || a.includes('managed future') || a.includes('currency') || a.includes('options') || a.includes('custom') || a.includes('multi-asset') || a.includes('defined outcome')) return 'Alternative';
  if(a.includes('cash') || a.includes('money market') || a.includes('ultrashort')) return 'Cash';
  return 'Equity';
}

function normalizeCategoryHistory(strat){
  const h = strat.holdingsHistory || {};
  const cats = ['Equity','Fixed Income','Alternative','Cash'];
  const n = (h.dates && h.dates.length) || (h.weights && h.weights.length) || 0;
  const out = {};
  cats.forEach(c => { out[c] = Array(n).fill(0); });

  if(h.categories && !Array.isArray(h.categories)){
    cats.forEach(c => {
      const arr = Array.isArray(h.categories[c]) ? h.categories[c] : [];
      out[c] = Array.from({length:n}, (_,i) => Number(arr[i]) || 0);
    });
    return out;
  }

  if(Array.isArray(h.categories)){
    for(let i=0;i<n;i++){
      const row = h.categories[i] || {};
      cats.forEach(c => { out[c][i] = Number(row[c]) || 0; });
    }
    return out;
  }

  if(h.classes && h.weights){
    h.weights.forEach((row, i) => {
      (row || []).forEach((w, j) => {
        const cat = classCategory(h.classes[j], strat);
        if(out[cat]) out[cat][i] += Number(w) || 0;
      });
    });
  }
  return out;
}

function currentHoldingCount(strat){
  if(strat.currentHoldings && strat.currentHoldings.length) return strat.currentHoldings.length;
  return strat.nHoldings != null ? Math.round(strat.nHoldings) : '&mdash;';
}

function holdingRangeText(strat){
  const h = strat.holdingsHistory;
  if(!h || !Array.isArray(h.weights) || !h.weights.length) return currentHoldingCount(strat);
  const counts = h.weights.map(row => (row || []).filter(v => Number(v) > 0.0001).length);
  const min = Math.min(...counts);
  const max = Math.max(...counts);
  return min === max ? String(max) : `${min}&ndash;${max}`;
}

function potentialAssetClassCount(strat){
  const h = strat.holdingsHistory;
  if(h && Array.isArray(h.classes) && h.classes.length) return h.classes.length;
  return strat.nAssetClasses != null ? Math.round(strat.nAssetClasses) : '&mdash;';
}

        <h4>Definitions</h4>
        <p><strong>Alpha:</strong> A measure of an investment's performance compared to a benchmark, indicating the risk-adjusted excess return of the investment relative to the return of the benchmark.</p>
        <p><strong>Annualized Return:</strong> The geometric average amount of money earned by an investment each year over a given time period, expressed as a percentage.</p>
        <p><strong>Beta:</strong> A measure of the volatility, or systematic risk, of an investment compared to the benchmark.</p>
        <p><strong>Information Ratio:</strong> A risk-adjusted performance measure that is defined as the excess return of an investment divided by the tracking error.</p>
        <p><strong>Maximum Drawdown (MaxDD):</strong> The maximum observed loss from a peak to a trough of an investment, before a new peak is attained, measured as a percentage.</p>
        <p><strong>Rolling Period Over / Under Performance:</strong> The annualized total excess return (if positive) or underperformance (if negative) of an investment compared to its benchmark, evaluated on a monthly basis over the indicated look-back period.</p>
        <p><strong>Sharpe Ratio:</strong> A risk-adjusted measure that is calculated by dividing the excess return of an investment by its standard deviation, indicating the average return earned in excess of the risk-free rate per unit of volatility.</p>
        <p><strong>Standard Deviation:</strong> A measure of the dispersion of a set of data from its mean, calculated as the square root of variance, indicating the historical volatility of an investment.</p>
        <p><strong>Total Return:</strong> The actual rate of return of an investment over a given period, including both capital appreciation and any dividends or interest payments.</p>
        <p><strong>Tracking Error:</strong> A measure of how closely an investment follows its benchmark, calculated as the standard deviation of the difference between the investment and benchmark returns.</p>
        <p><strong>Up Capture / Down Capture:</strong> The ratio of the strategy's return to the benchmark's return during bull (up) or bear (down) regimes, expressed as a percentage. A down capture below 100% indicates the strategy declined less than the benchmark during the bear regime.</p>

  const dStr = delta==null ? '' : 'Δ '+fmtPctSigned(delta, d);

    <div class="label">${label}</div>
    <div class="val ${valCls}">${fmtPct(val, d)}</div>

    <div class="label">${label}</div>
    <div class="val neg">${fmtPct(val, d)}</div>
    <div class="bmk-row"><span class="bmk-lbl">Bmk</span><span class="bmk-val">${fmtPct(bmk, d)}</span></div>
    <span class="delta ${dCls}">${dStr}</span>
  </div>`;
}
function kpiSingle(label, valStr){
  return `<div class="kpi single">
    <div class="label">${label}</div>
    <div class="val">${valStr}</div>
    <div class="bmk-row"><span class="bmk-lbl">&nbsp;</span><span class="bmk-val">&nbsp;</span></div>
    <span class="delta flat">&nbsp;</span>
  </div>`;
}

// ====================== CHART BUILDERS ======================
const COMMON_OPTS = () => ({
  responsive:true, maintainAspectRatio:false, animation:{duration:300},
  plugins:{
    legend:{display:true, position:'bottom', labels:{font:{family:'Lato',size:10}, usePointStyle:true, boxWidth:8, padding:10, color:'#1A1A1A'}},
    tooltip:{backgroundColor:'#1A1A1A', padding:10, titleFont:{family:'Lato',size:11}, bodyFont:{family:'Lato',size:11}, cornerRadius:2, displayColors:true}
  },
  scales:{
    x:{grid:{display:false}, ticks:{font:{family:'Lato',size:9}, color:'#7A8A95', maxRotation:0, autoSkip:true, maxTicksLimit:10}},
    y:{grid:{color:COLORS.grid, drawBorder:false}, ticks:{font:{family:'Lato',size:9}, color:'#7A8A95'}}
  }
});

function buildTabCharts(s, a){
  // Destroy all charts first then rebuild only visible ones (simpler; data size is small)
  destroyCharts();
  if(activeTab === 'stats') buildStatsCharts(s, a);
  else if(activeTab === 'behav') buildBehavCharts(s, a);
  else if(activeTab === 'exp') buildExposureCharts(s, a);
}

function buildStatsCharts(s, a){
  const opts = COMMON_OPTS();

  // Trailing 12-Month Relative Returns (monthly index - benchmark)
  const N=s.sLvl.length; const rLab=[], rDat=[];
  for(let i=Math.max(1,N-12); i<N; i++){ const rs=s.sLvl[i]/s.sLvl[i-1]-1, rb=s.bLvl[i]/s.bLvl[i-1]-1; rDat.push((rs-rb)*100); const dd=new Date(s.dates[i]); rLab.push(dd.toLocaleDateString('en-US',{month:'short',year:'2-digit'})); }
  const relLabels={id:'relLabels', afterDatasetsDraw(chart){ const {ctx}=chart; const meta=chart.getDatasetMeta(0); ctx.save(); ctx.font='700 9px Lato'; ctx.textAlign='center';
    meta.data.forEach((bar,i)=>{ const v=chart.data.datasets[0].data[i]; ctx.fillStyle=v>=0?COLORS.sage:COLORS.terra; const y=v>=0?bar.y-5:bar.y+12; ctx.fillText((v>=0?'+':'')+v.toFixed(1)+'%', bar.x, y); }); ctx.restore(); }};
  currentCharts.push(new Chart(document.getElementById('chart-rel12'), {
    type:'bar',
    data:{labels:rLab, datasets:[{data:rDat, backgroundColor:rDat.map(v=>v>=0?'rgba(46,139,122,0.85)':'rgba(180,101,74,0.85)'), borderColor:rDat.map(v=>v>=0?COLORS.teal:COLORS.terra), borderWidth:1, borderRadius:5, borderSkipped:false, barPercentage:0.74, categoryPercentage:0.86}]},
    options:{...opts, layout:{padding:{top:18,bottom:6}}, plugins:{...opts.plugins, legend:{display:false}, tooltip:{...opts.plugins.tooltip, callbacks:{label:ctx=>(ctx.parsed.y>=0?'+':'')+ctx.parsed.y.toFixed(2)+'% vs benchmark'}}},
      scales:{x:{...opts.scales.x, grid:{display:false}, ticks:{...opts.scales.x.ticks, maxRotation:0, autoSkip:false, font:{family:'Lato',size:10}}}, y:{...opts.scales.y, grid:{color:c=>c.tick.value===0?'#A8A09A':COLORS.grid}, ticks:{...opts.scales.y.ticks, callback:v=>(v>0?'+':'')+v+'%'}}}},
    plugins:[relLabels]
  }));

  // Total Return Growth: strategy + benchmark lines
  const labels = a.growthS.map(g => g.date.slice(0,7));
  currentCharts.push(new Chart(document.getElementById('chart-growth'), {
    type:'line',
    data:{labels, datasets:[
      {label:'Index', data:a.growthS.map(g=>g.v*100), borderColor:COLORS.navy, backgroundColor:'rgba(12,65,96,0.06)', borderWidth:1.8, fill:true, pointRadius:0, tension:0.1},
      {label:s.benchmarkName||'Benchmark', data:a.growthB.map(g=>g.v*100), borderColor:COLORS.slate, backgroundColor:'transparent', borderWidth:1.5, borderDash:[4,3], fill:false, pointRadius:0, tension:0.1},
    ]},
    options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>v+'%'}}}}
  }));

}

function buildBehavCharts(s, a){
  const opts = COMMON_OPTS();

  // 1) SCATTER
  const pts = scatterData(s);
  (function(){ const tot=pts.length; if(!tot) return; let tl=0,tr=0,bl=0,br=0;
    pts.forEach(p=>{ const x=p.excessV, y=p.excessR; if(y>0){ x<0?tl++:tr++; } else { x<0?bl++:br++; } });
    const pc=v=>Math.round(v/tot*100)+'% of months';
    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=pc(v); };
    set('qpct-tl',tl); set('qpct-tr',tr); set('qpct-bl',bl); set('qpct-br',br); })();
  const lastIdx = pts.length - 1;
  const scatterPts = pts.slice(0, -1).map(p => ({x: p.excessV*100, y: p.excessR*100}));
  const lastPt = pts.length ? [{x: pts[lastIdx].excessV*100, y: pts[lastIdx].excessR*100}] : [];
  currentCharts.push(new Chart(document.getElementById('chart-scatter'), {
    type:'scatter',
    data:{datasets:[
      {label:'Trailing 1Y Observations', data: scatterPts, backgroundColor:'rgba(12,65,96,0.35)', borderColor:'rgba(12,65,96,0.55)', pointRadius:3.2, pointHoverRadius:5},
      {label:`Most Recent (${fmtDateShort(s.asOf)})`, data: lastPt, backgroundColor:COLORS.terra, borderColor:COLORS.terra, pointRadius:9, pointStyle:'rectRot'},
    ]},
    options:{
      ...opts,
      plugins:{
        ...opts.plugins,
        tooltip:{...opts.plugins.tooltip, callbacks:{
          label:ctx => `Excess Vol: ${ctx.parsed.x.toFixed(2)}%  |  Excess Return: ${ctx.parsed.y.toFixed(2)}%`
        }}
      },
      scales:{
        x:{
          title:{display:true, text:'STANDARD DEVIATION (INDEX − BENCHMARK)', font:{family:'Lato',size:10,weight:'bold'}, color:'#7A8A95'},
          grid:{color:(ctx)=> ctx.tick.value===0 ? '#A8A09A' : COLORS.grid},
          ticks:{font:{family:'Lato',size:9}, color:'#7A8A95', callback:v=>v.toFixed(1)+'%'}
        },
        y:{
          title:{display:true, text:'TOTAL RETURN (INDEX − BENCHMARK)', font:{family:'Lato',size:10,weight:'bold'}, color:'#7A8A95'},
          grid:{color:(ctx)=> ctx.tick.value===0 ? '#A8A09A' : COLORS.grid},
          ticks:{font:{family:'Lato',size:9}, color:'#7A8A95', callback:v=>v.toFixed(1)+'%'}
        }
      }
    }
  }));

  // 2) ROLLING 12M RETURN — strategy + benchmark + spread
  const r12Labels = a.roll12S.map(x=>x.date.slice(0,7));
  const sArr = a.roll12S.map(x=>x.r*100);
  const bArr = a.roll12B.map(x=>x.r*100);
  const spreadArr = sArr.map((v,i)=> v - (bArr[i]||0));
  currentCharts.push(new Chart(document.getElementById('chart-roll12'), {
    type:'line',
    data:{labels:r12Labels, datasets:[
      {label:'Index', data:sArr, borderColor:COLORS.navy, backgroundColor:'rgba(12,65,96,0.04)', borderWidth:1.5, fill:false, pointRadius:0, tension:0.1},
      {label:'Benchmark', data:bArr, borderColor:COLORS.slate, borderDash:[4,3], backgroundColor:'transparent', borderWidth:1.3, fill:false, pointRadius:0, tension:0.1},
      {label:'Spread (Index − Benchmark)', data:spreadArr, borderColor:COLORS.terra, backgroundColor:'rgba(180,101,74,0.12)', borderWidth:1.2, fill:true, pointRadius:0, tension:0.1},
    ]},
    options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>v+'%'}}}}
  }));

  // 3) ROLLING 12M VOLATILITY — strategy + benchmark + spread
  const vLabels = a.volS.map(x=>x.date.slice(0,7));
  const vS = a.volS.map(x=>x.vol*100);
  const vB = a.volB.map(x=>x.vol*100);
  const vSpread = vS.map((v,i)=> v - (vB[i]||0));
  currentCharts.push(new Chart(document.getElementById('chart-rollvol'), {
    type:'line',
    data:{labels:vLabels, datasets:[
      {label:'Index', data:vS, borderColor:COLORS.navy, backgroundColor:'rgba(12,65,96,0.04)', borderWidth:1.5, fill:false, pointRadius:0, tension:0.1},
      {label:'Benchmark', data:vB, borderColor:COLORS.slate, borderDash:[4,3], backgroundColor:'transparent', borderWidth:1.3, fill:false, pointRadius:0, tension:0.1},
      {label:'Spread (Index − Benchmark)', data:vSpread, borderColor:COLORS.terra, backgroundColor:'rgba(180,101,74,0.12)', borderWidth:1.2, fill:true, pointRadius:0, tension:0.1},
    ]},
    options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>v+'%'}}}}
  }));

  // 4) DRAWDOWN — strategy (area) + benchmark (line)
  const ddLabels = a.ddS.map(x=>x.date.slice(0,7));
  currentCharts.push(new Chart(document.getElementById('chart-dd'), {
    type:'line',
    data:{labels:ddLabels, datasets:[
      {label:'Index', data:a.ddS.map(x=>x.dd*100), borderColor:COLORS.terra, backgroundColor:'rgba(180,101,74,0.18)', borderWidth:1.2, fill:true, pointRadius:0},
      {label:s.benchmarkName||'Benchmark', data:a.ddB.map(x=>x.dd*100), borderColor:COLORS.slate, borderDash:[4,3], backgroundColor:'transparent', borderWidth:1.3, fill:false, pointRadius:0},
    ]},
    options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, max:0, ticks:{...opts.scales.y.ticks, callback:v=>v+'%'}}}}
  }));

  // 5) REGIME MINI CHART + TABLE
  const regimes = regimeAnalysis(s);
  // Mini chart: show benchmark level with red/green regime bands
  const benchLevels = s.bLvl.map((v,i) => ({x:i, y:v}));
  const labels = s.dates.map(d=>d.slice(0,7));
  const bgPlugin = {
    id:'regimeBg',
    beforeDraw(chart){
      const {ctx, chartArea:ca, scales} = chart;
      if(!ca) return;
      ctx.save();
      regimes.forEach(r => {
        const x1 = scales.x.getPixelForValue(r.sIdx);
        const x2 = scales.x.getPixelForValue(r.eIdx);
        ctx.fillStyle = r.type==='Bear' ? 'rgba(180,101,74,0.12)' : 'rgba(61,107,94,0.08)';
        ctx.fillRect(x1, ca.top, x2-x1, ca.bottom-ca.top);
      });
      ctx.restore();
    }
  };
  currentCharts.push(new Chart(document.getElementById('chart-regime'), {
    type:'line',
    data:{labels, datasets:[{label:'Benchmark (log)', data: s.bLvl, borderColor:COLORS.soft, backgroundColor:'transparent', borderWidth:1, fill:false, pointRadius:0, tension:0.1}]},
    options:{
      responsive:true, maintainAspectRatio:false, animation:{duration:300},
      plugins:{legend:{display:false}, tooltip:{enabled:false}},
      scales:{
        x:{grid:{display:false}, ticks:{font:{family:'Lato',size:9}, color:'#7A8A95', maxRotation:0, autoSkip:true, maxTicksLimit:8}},
        y:{type:'logarithmic', grid:{display:false}, ticks:{display:false}}
      }
    },
    plugins:[bgPlugin]
  }));

  document.getElementById('tbl-regime').innerHTML = regimes.map(r => {
    const tag = r.isCurrent ? `Bull (Current)` : r.type;
    const cls = r.type==='Bull' ? 'r-bull' : 'r-bear';
    const capLbl = r.type==='Bull' ? 'Up Capture' : 'Down Capture';
    const capVal = r.capture != null ? `${Math.round(r.capture)}% ${capLbl}` : '—';
    return `<tr>
      <td><span class="${cls}">${tag.toUpperCase()}</span></td>
      <td>${r.period}</td>
      <td>${r.months}</td>
      <td class="${r.bRet>=0?'pos':'neg'}">${fmtPctSigned(r.bRet,1)}</td>
      <td class="${r.sRet>=0?'pos':'neg'}">${fmtPctSigned(r.sRet,1)}</td>
      <td class="${r.delta>=0?'pos':'neg'}">${fmtPctSigned(r.delta,1)}</td>
      <td>${capVal}</td>
    </tr>`;
  }).join('');
}

function buildExposureCharts(s, a){
  const opts = COMMON_OPTS();
  const PALETTE = [COLORS.navy, COLORS.gold, COLORS.terra, COLORS.teal, COLORS.slate, COLORS.sage, COLORS.plum, '#8FA9BE', '#C9A66B', '#7A9E94', '#B58463', '#9DB0C2'];
  const secI = s.sectorIndex||{}, secB = s.sectorBench||{};
  const sectors = Array.from(new Set([...Object.keys(secI), ...Object.keys(secB)])).sort();
  const secColor = {}; sectors.forEach((sec,i)=> secColor[sec]=PALETTE[i%PALETTE.length]);

  // % labels drawn on donut slices (>= 4%)
  const donutLabels = {id:'donutLabels', afterDatasetsDraw(chart){
    const {ctx}=chart; const meta=chart.getDatasetMeta(0); ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    meta.data.forEach((arc,i)=>{
      const v=chart.data.datasets[0].data[i]; if(v<4) return;
      const ang=(arc.startAngle+arc.endAngle)/2, r=(arc.innerRadius+arc.outerRadius)/2;
      const x=arc.x+Math.cos(ang)*r, y=arc.y+Math.sin(ang)*r;
      ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=2;
      ctx.fillStyle='#fff'; ctx.font='800 9.5px Lato';
      ctx.fillText(v.toFixed(0)+'%', x, y);
    });
    ctx.restore();
  }};

  // value labels at the end of horizontal bars
  const barLabels = (dec) => ({id:'barLabels'+dec, afterDatasetsDraw(chart){
    const {ctx}=chart; const meta=chart.getDatasetMeta(0); ctx.save();
    ctx.font='700 9px Lato'; ctx.textBaseline='middle';
    meta.data.forEach((bar,i)=>{
      const v=chart.data.datasets[0].data[i]; const pos=v>=0;
      ctx.textAlign=pos?'left':'right';
      ctx.fillStyle='#4A4A4A';
      ctx.fillText((pos?'+':'')+v.toFixed(dec)+'%', bar.x+(pos?4:-4), bar.y);
    });
    ctx.restore();
  }});

  function pie(id, map){
    currentCharts.push(new Chart(document.getElementById(id), {
      type:'doughnut',
      data:{labels:sectors, datasets:[{data:sectors.map(x=>(map[x]||0)*100), backgroundColor:sectors.map(x=>secColor[x]), borderWidth:2, borderColor:'#fff'}]},
      options:{responsive:true, maintainAspectRatio:false, cutout:'52%', plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.parsed.toFixed(1)+'%'}}}},
      plugins:[donutLabels]
    }));
  }
  pie('chart-sector-idx', secI);
  pie('chart-sector-bench', secB);
  document.getElementById('sector-legend').innerHTML = sectors.map(sec=>
    '<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;margin:3px 16px 3px 0">'+
    '<span style="width:10px;height:10px;background:'+secColor[sec]+';display:inline-block;border-radius:2px"></span>'+sec+'</span>').join('');

  // Sector over / underweight (diverging horizontal bars)
  const ou = sectors.map(sec=>({sec, d:((secI[sec]||0)-(secB[sec]||0))*100})).sort((x,y)=>y.d-x.d);
  currentCharts.push(new Chart(document.getElementById('chart-sector-ou'), {
    type:'bar',
    data:{labels:ou.map(x=>x.sec), datasets:[{data:ou.map(x=>x.d), backgroundColor:ou.map(x=>x.d>=0?COLORS.teal:COLORS.terra), borderWidth:0, borderRadius:3}]},
    options:{...opts, indexAxis:'y', layout:{padding:{right:30,left:30}}, plugins:{...opts.plugins, legend:{display:false}, tooltip:{...opts.plugins.tooltip, callbacks:{label:ctx=>(ctx.parsed.x>=0?'+':'')+ctx.parsed.x.toFixed(2)+'%'}}},
      scales:{x:{...opts.scales.x, grace:'12%', ticks:{...opts.scales.x.ticks, callback:v=>(v>0?'+':'')+v+'%'}}, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, autoSkip:false, font:{family:'Lato',size:10}}}}},
    plugins:[barLabels(1)]
  }));

  // Top 10 index holdings table
  const fw = v => (v*100).toFixed(2)+'%';
  document.getElementById('tbl-top-holdings').innerHTML = (s.topHoldings||[]).map(h=>{
    const dd = h.idxW-(h.benchW||0);
    return '<tr><td style="font-weight:700">'+h.ticker+'</td><td>'+h.name+'</td><td style="color:var(--slate)">'+h.sector+'</td><td>'+fw(h.idxW)+'</td><td>'+fw(h.benchW||0)+'</td><td class="'+(dd>=0?'pos':'neg')+'">'+(dd>=0?'+':'')+(dd*100).toFixed(2)+'%</td></tr>';
  }).join('');

  // Over / under weight by holding (diverging bars)
  function owBar(id, arr, color){
    const rows = arr.slice().sort((x,y)=>Math.abs(y.diff)-Math.abs(x.diff));
    currentCharts.push(new Chart(document.getElementById(id), {
      type:'bar',
      data:{labels:rows.map(x=>x.ticker), datasets:[{data:rows.map(x=>x.diff*100), backgroundColor:color, borderWidth:0, borderRadius:3}]},
      options:{...opts, indexAxis:'y', layout:{padding:{right:34,left:34}}, plugins:{...opts.plugins, legend:{display:false}, tooltip:{...opts.plugins.tooltip, callbacks:{title:items=>rows[items[0].dataIndex].name, label:ctx=>(ctx.parsed.x>=0?'+':'')+ctx.parsed.x.toFixed(2)+'% vs benchmark'}}},
        scales:{x:{...opts.scales.x, grace:'14%', ticks:{...opts.scales.x.ticks, callback:v=>(v>0?'+':'')+v+'%'}}, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, autoSkip:false, font:{family:'Lato',size:10}}}}},
      plugins:[barLabels(2)]
    }));
  }
  owBar('chart-overweights', s.overweights||[], COLORS.teal);
  owBar('chart-underweights', s.underweights||[], COLORS.terra);
}

function riskColor(r){
  if(r==null) return COLORS.slate;
  if(r<30) return COLORS.sage;
  if(r<50) return COLORS.teal;
  if(r<70) return COLORS.navy;
  if(r<85) return COLORS.gold;
  return COLORS.terra;
}

// ====================== INIT ======================
renderMain();
</script>
